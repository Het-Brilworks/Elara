<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elara - Your Maternal Wellness Companion</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #7b2f4c 0%, #9d425f 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        text-align: center;
        color: white;
        max-width: 600px;
      }

      .logo {
        font-size: 80px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 48px;
        font-weight: 800;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
      }

      .tagline {
        font-size: 20px;
        margin-bottom: 40px;
        opacity: 0.95;
        font-weight: 500;
      }

      .links {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .link-button {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 16px 32px;
        border-radius: 50px;
        text-decoration: none;
        color: white;
        font-weight: 600;
        font-size: 16px;
        transition: all 0.3s ease;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .link-button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      }

      .footer {
        margin-top: 60px;
        opacity: 0.8;
        font-size: 14px;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 36px;
        }

        .tagline {
          font-size: 18px;
        }

        .logo {
          font-size: 60px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🤰</div>
      <h1>Elara</h1>
      <p class="tagline">Your companion through every stage of motherhood</p>

      <div class="links">
        <a href="/privacy-policy.html" class="link-button">Privacy Policy</a>
        <a href="mailto:digital@brilworks.com" class="link-button"
          >Contact Us</a
        >
      </div>

      <p class="footer">
        © 2026 Elara. All rights reserved.<br />
        Built with 💕 for mothers everywhere
      </p>
    </div>
  </body>
</html>
